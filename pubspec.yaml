name: flutter_game_template

description: A Flutter multi platform game template.

publish_to: "none"


environment:
  sdk: ">=2.19.0 <3.0.0"


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0


flutter:

  uses-material-design: true


  assets:

    - assets/images/link/
    - assets/sounds/